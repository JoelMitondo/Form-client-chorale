<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulaire Création Site Web</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<header>

<h1>Demande de création de site web</h1>

<p>
Ce formulaire nous permettra de recueillir toutes les informations nécessaires
pour concevoir votre site web.
</p>

</header>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="form">

<!-- STEP 1 -->
<div class="step active">

<h2>Informations du responsable</h2>

<label>Nom complet</label>
<input type="text" name="nom" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Téléphone</label>
<input type="tel" name="telephone" required>

<button type="button" class="next">Suivant</button>

</div>


<!-- STEP 2 -->
<div class="step">

<h2>Informations sur la chorale</h2>

<label>Nom de la chorale</label>
<input type="text" name="chorale">

<label>Année de création</label>
<input type="text" name="annee">

<label>Nombre de choristes</label>
<input type="number" name="choristes">

<div class="buttons">

<button type="button" class="prev">Retour</button>
<button type="button" class="next">Suivant</button>

</div>

</div>


<!-- STEP 3 -->
<div class="step">

<h2>Objectif du site</h2>

<label>Pourquoi voulez-vous un site web ?</label>
<textarea name="objectif"></textarea>

<label>Public ciblé</label>
<input type="text" name="public">

<div class="buttons">

<button type="button" class="prev">Retour</button>
<button type="button" class="next">Suivant</button>

</div>

</div>


<!-- STEP 4 -->
<div class="step">

<h2>Design souhaité</h2>

<label>Couleurs préférées</label>
<input type="text" name="couleurs">

<label>Sites web que vous aimez</label>
<textarea name="exemples"></textarea>

<div class="buttons">

<button type="button" class="prev">Retour</button>
<button type="submit">Envoyer</button>

</div>

</div>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
